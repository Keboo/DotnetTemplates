trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**/*.md'

pr:
  branches:
    include:
      - main

variables:
  buildConfiguration: 'Release'
  version: '1.0.$(Build.BuildId)'

stages:
  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: BuildJob
        displayName: 'Build Console App'
        pool:
          vmImage: 'ubuntu-latest'
        
        steps:
          - checkout: self
            clean: true

          - task: UseDotNet@2
            displayName: 'Set up .NET Core'
            inputs:
              packageType: 'sdk'
              version: '8.x'

          - task: DotNetCoreCLI@2
            displayName: 'dotnet restore'
            inputs:
              command: 'restore'
              projects: '**/*.csproj'

          - task: DotNetCoreCLI@2
            displayName: 'dotnet build'
            inputs:
              command: 'build'
              projects: '**/*.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          # Microsoft Testing Platform can stop the run once 10 tests fail in CI:
          # https://learn.microsoft.com/dotnet/core/testing/microsoft-testing-platform-cli-options
          # To enable retries, add Microsoft.Testing.Extensions.Retry to the test project, then pass
          # --retry-failed-tests plus --retry-failed-tests-max-percentage <value> to skip reruns when too many tests fail:
          # https://learn.microsoft.com/dotnet/core/testing/microsoft-testing-platform-retry#retry-1
          - task: DotNetCoreCLI@2
            displayName: 'dotnet test'
            inputs:
              command: 'test'
              projects: '**/*Tests.csproj'
              arguments: '--configuration $(buildConfiguration) --no-build --maximum-failed-tests 10 -- --coverage --coverage-output-format cobertura --coverage-output coverage.cobertura.xml'
              publishTestResults: true

          - task: reportgenerator@5
            displayName: 'Generate Code Coverage Report'
            inputs:
              reports: '**/TestResults/coverage.cobertura.xml'
              targetdir: '$(Build.ArtifactStagingDirectory)/coveragereport'
              reporttypes: 'HtmlInline_AzurePipelines;Cobertura'
              title: 'Code Coverage'

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish Code Coverage'
            inputs:
              summaryFileLocation: '$(Build.ArtifactStagingDirectory)/coveragereport/Cobertura.xml'
              pathToSources: '$(Build.SourcesDirectory)'
              reportDirectory: '$(Build.ArtifactStagingDirectory)/coveragereport'

          - task: PublishBuildArtifacts@1
            displayName: 'Upload Build Artifact'
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
            inputs:
              pathToPublish: '$(Build.BinariesDirectory)'
              artifactName: 'binaries'
              publishLocation: 'Container'
