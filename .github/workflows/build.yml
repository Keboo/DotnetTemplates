name: .NET Core

on:
  push:
    branches: [ main ]
    # Sequence of patterns matched against refs/tags
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

defaults:
  run:
    shell: pwsh

env:
  DOTNET_VERSION: 10.x

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      console: ${{ github.event_name != 'pull_request' || steps.filter.outputs.console == 'true' || steps.filter.outputs.shared == 'true' }}
      wpf: ${{ github.event_name != 'pull_request' || steps.filter.outputs.wpf == 'true' || steps.filter.outputs.shared == 'true' }}
      library: ${{ github.event_name != 'pull_request' || steps.filter.outputs.library == 'true' || steps.filter.outputs.shared == 'true' }}
      avalonia: ${{ github.event_name != 'pull_request' || steps.filter.outputs.avalonia == 'true' || steps.filter.outputs.shared == 'true' }}
    steps:
      - name: Detect changed templates
        uses: dorny/paths-filter@v4
        id: filter
        continue-on-error: true
        with:
          token: ${{ github.token }}
          filters: |
            shared:
              - 'Templates.csproj'
              - 'global.json'
            console:
              - 'templates/Console/**'
            wpf:
              - 'templates/WPF/**'
            library:
              - 'templates/Library/**'
            avalonia:
              - 'templates/Avalonia/**'

  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v7.0.0
       
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: Build
      run: dotnet pack --configuration Release -o . 
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v7.0.1
      with:
        name: NuGet
        path: ${{ github.workspace }}\*.nupkg

  test-console:
    runs-on: ubuntu-latest
    needs: [build, detect-changes]
    if: needs.detect-changes.outputs.console == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: "Default (slnx with tests)"
            template-args: ""
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "Legacy sln format"
            template-args: "--sln true"
            check-slnx: false
            check-sln: true
            check-tests: true
            check-github: true
            check-devops: false
          - name: "No tests"
            template-args: "--tests none"
            check-slnx: true
            check-sln: false
            check-tests: false
            check-github: true
            check-devops: false
          - name: "xUnit tests"
            template-args: "--tests xunit"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "MSTest tests"
            template-args: "--tests mstest"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "TUnit tests"
            template-args: "--tests tunit"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "No solution"
            template-args: "--no-sln"
            check-slnx: false
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "Pipeline GitHub"
            template-args: "--pipeline github"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "Pipeline Azure DevOps"
            template-args: "--pipeline azuredevops"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: false
            check-devops: true
          - name: "Pipeline None"
            template-args: "--pipeline none"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: false
            check-devops: false

    steps:
      - name: Download NuGet Artifacts
        uses: actions/download-artifact@v8
        with:
          name: NuGet

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Test Template - ${{ matrix.name }}
        run: |
          dotnet new install $(Get-ChildItem -Path "Keboo.Dotnet.Templates.*.nupkg").Name
          mkdir TestConsoleApp
          Push-Location TestConsoleApp
          dotnet new keboo.console -n my-console-app ${{ matrix.template-args }}
          
      - name: Verify slnx file exists
        if: matrix.check-slnx == true
        run: |
          if (-not (Test-Path "TestConsoleApp/my-console-app/*.slnx")) {
            throw "Expected .slnx file not found"
          }
          Write-Host "Contents of .slnx file:"
          Get-Content TestConsoleApp/my-console-app/*.slnx
          
      - name: Verify sln file exists
        if: matrix.check-sln == true
        run: |
          if (-not (Test-Path "TestConsoleApp/my-console-app/*.sln")) {
            throw "Expected .sln file not found"
          }
          Write-Host "Contents of .sln file:"
          Get-Content TestConsoleApp/my-console-app/*.sln
          
      - name: Verify tests folder exists
        if: matrix.check-tests == true
        run: |
          if (-not (Test-Path "TestConsoleApp/my-console-app/my-console-app.Tests")) {
            throw "Expected Tests folder not found"
          }
          
      - name: Verify tests folder does not exist
        if: matrix.check-tests == false
        run: |
          if (Test-Path "TestConsoleApp/my-console-app/my-console-app.Tests") {
            throw "Tests folder should not exist"
          }
          
      - name: Verify .github folder exists
        if: matrix.check-github == true
        run: |
          if (-not (Test-Path "TestConsoleApp/my-console-app/.github")) {
            throw "Expected .github folder not found"
          }
          
      - name: Verify .github folder does not exist
        if: matrix.check-github == false
        run: |
          if (Test-Path "TestConsoleApp/my-console-app/.github") {
            throw ".github folder should not exist"
          }
          
      - name: Verify .devops folder exists
        if: matrix.check-devops == true
        run: |
          if (-not (Test-Path "TestConsoleApp/my-console-app/.devops")) {
            throw "Expected .devops folder not found"
          }
          
      - name: Verify .devops folder does not exist
        if: matrix.check-devops == false
        run: |
          if (Test-Path "TestConsoleApp/my-console-app/.devops") {
            throw ".devops folder should not exist"
          }
          
      - name: Build and Test Solution
        if: matrix.check-tests == true && (matrix.check-sln == true || matrix.check-slnx == true)
        run: |
          Push-Location TestConsoleApp/my-console-app
          dotnet build
          dotnet test --no-build
          
      - name: Build Solution
        if: matrix.check-tests == false && (matrix.check-sln == true || matrix.check-slnx == true)
        run: |
          Push-Location TestConsoleApp/my-console-app
          dotnet build
      
      - name: Build Project Only
        if: matrix.check-tests == false && matrix.check-sln == false && matrix.check-slnx == false
        run: |
          Push-Location TestConsoleApp/my-console-app/my-console-app
          dotnet build
      
      - name: Build and Test Project Only
        if: matrix.check-tests == true && matrix.check-sln == false && matrix.check-slnx == false
        run: |
          Push-Location TestConsoleApp/my-console-app/my-console-app
          dotnet build
          Pop-Location
          Push-Location TestConsoleApp/my-console-app/my-console-app.Tests
          dotnet test

  test-wpf:
    runs-on: windows-latest
    needs: [build, detect-changes]
    if: needs.detect-changes.outputs.wpf == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: "Default (slnx with tests)"
            template-args: ""
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "Legacy sln format"
            template-args: "--sln true"
            check-slnx: false
            check-sln: true
            check-tests: true
            check-github: true
            check-devops: false
          - name: "No tests"
            template-args: "--tests none"
            check-slnx: true
            check-sln: false
            check-tests: false
            check-github: true
            check-devops: false
          - name: "xUnit tests"
            template-args: "--tests xunit"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "MSTest tests"
            template-args: "--tests mstest"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "TUnit tests"
            template-args: "--tests tunit"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "No solution"
            template-args: "--no-sln"
            check-slnx: false
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "Pipeline GitHub"
            template-args: "--pipeline github"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "Pipeline Azure DevOps"
            template-args: "--pipeline azuredevops"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: false
            check-devops: true
          - name: "Pipeline None"
            template-args: "--pipeline none"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: false
            check-devops: false

    steps:
      - name: Download NuGet Artifacts
        uses: actions/download-artifact@v8
        with:
          name: NuGet

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Test Template - ${{ matrix.name }}
        run: |
          dotnet new install $(Get-ChildItem -Path "Keboo.Dotnet.Templates.*.nupkg").Name
          mkdir TestWpfApp
          Push-Location TestWpfApp
          dotnet new keboo.wpf -n my-wpf-app ${{ matrix.template-args }}
          
      - name: Verify slnx file exists
        if: matrix.check-slnx == true
        run: |
          if (-not (Test-Path "TestWpfApp/my-wpf-app/*.slnx")) {
            throw "Expected .slnx file not found"
          }
          Write-Host "Contents of .slnx file:"
          Get-Content TestWpfApp/my-wpf-app/*.slnx
          
      - name: Verify sln file exists
        if: matrix.check-sln == true
        run: |
          if (-not (Test-Path "TestWpfApp/my-wpf-app/*.sln")) {
            throw "Expected .sln file not found"
          }
          Write-Host "Contents of .sln file:"
          Get-Content TestWpfApp/my-wpf-app/*.sln
          
      - name: Verify tests folder exists
        if: matrix.check-tests == true
        run: |
          if (-not (Test-Path "TestWpfApp/my-wpf-app/my-wpf-app.Tests")) {
            throw "Expected Tests folder not found"
          }
          
      - name: Verify tests folder does not exist
        if: matrix.check-tests == false
        run: |
          if (Test-Path "TestWpfApp/my-wpf-app/my-wpf-app.Tests") {
            throw "Tests folder should not exist"
          }
          
      - name: Verify .github folder exists
        if: matrix.check-github == true
        run: |
          if (-not (Test-Path "TestWpfApp/my-wpf-app/.github")) {
            throw "Expected .github folder not found"
          }
          
      - name: Verify .github folder does not exist
        if: matrix.check-github == false
        run: |
          if (Test-Path "TestWpfApp/my-wpf-app/.github") {
            throw ".github folder should not exist"
          }
          
      - name: Verify .devops folder exists
        if: matrix.check-devops == true
        run: |
          if (-not (Test-Path "TestWpfApp/my-wpf-app/.devops")) {
            throw "Expected .devops folder not found"
          }
          
      - name: Verify .devops folder does not exist
        if: matrix.check-devops == false
        run: |
          if (Test-Path "TestWpfApp/my-wpf-app/.devops") {
            throw ".devops folder should not exist"
          }
          
      - name: Build and Test Solution
        if: matrix.check-tests == true && (matrix.check-sln == true || matrix.check-slnx == true)
        run: |
          Push-Location TestWpfApp/my-wpf-app
          dotnet build
          dotnet test --no-build
          
      - name: Build Solution
        if: matrix.check-tests == false && (matrix.check-sln == true || matrix.check-slnx == true)
        run: |
          Push-Location TestWpfApp/my-wpf-app
          dotnet build
      
      - name: Build Project Only
        if: matrix.check-tests == false && matrix.check-sln == false && matrix.check-slnx == false
        run: |
          Push-Location TestWpfApp/my-wpf-app/my-wpf-app
          dotnet build
      
      - name: Build and Test Project Only
        if: matrix.check-tests == true && matrix.check-sln == false && matrix.check-slnx == false
        run: |
          Push-Location TestWpfApp/my-wpf-app/my-wpf-app
          dotnet build
          Pop-Location
          Push-Location TestWpfApp/my-wpf-app/my-wpf-app.Tests
          dotnet test

  test-library:
    runs-on: ubuntu-latest
    needs: [build, detect-changes]
    if: needs.detect-changes.outputs.library == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: "Default (slnx with tests)"
            template-args: ""
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "Legacy sln format"
            template-args: "--sln true"
            check-slnx: false
            check-sln: true
            check-tests: true
            check-github: true
            check-devops: false
          - name: "No tests"
            template-args: "--tests none"
            check-slnx: true
            check-sln: false
            check-tests: false
            check-github: true
            check-devops: false
          - name: "xUnit tests"
            template-args: "--tests xunit"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "MSTest tests"
            template-args: "--tests mstest"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "TUnit tests"
            template-args: "--tests tunit"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "No solution"
            template-args: "--no-sln"
            check-slnx: false
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "Pipeline GitHub"
            template-args: "--pipeline github"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: true
            check-devops: false
          - name: "Pipeline Azure DevOps"
            template-args: "--pipeline azuredevops"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: false
            check-devops: true
          - name: "Pipeline None"
            template-args: "--pipeline none"
            check-slnx: true
            check-sln: false
            check-tests: true
            check-github: false
            check-devops: false

    steps:
      - name: Download NuGet Artifacts
        uses: actions/download-artifact@v8
        with:
          name: NuGet

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Test Template - ${{ matrix.name }}
        run: |
          dotnet new install $(Get-ChildItem -Path "Keboo.Dotnet.Templates.*.nupkg").Name
          mkdir TestLibrary
          Push-Location TestLibrary
          dotnet new keboo.nuget -n my-lib ${{ matrix.template-args }}
          
      - name: Verify slnx file exists
        if: matrix.check-slnx == true
        run: |
          if (-not (Test-Path "TestLibrary/my-lib/*.slnx")) {
            throw "Expected .slnx file not found"
          }
          Write-Host "Contents of .slnx file:"
          Get-Content TestLibrary/my-lib/*.slnx
          
      - name: Verify sln file exists
        if: matrix.check-sln == true
        run: |
          if (-not (Test-Path "TestLibrary/my-lib/*.sln")) {
            throw "Expected .sln file not found"
          }
          Write-Host "Contents of .sln file:"
          Get-Content TestLibrary/my-lib/*.sln
          
      - name: Verify tests folder exists
        if: matrix.check-tests == true
        run: |
          if (-not (Test-Path "TestLibrary/my-lib/my-lib.Tests")) {
            throw "Expected Tests folder not found"
          }
          
      - name: Verify tests folder does not exist
        if: matrix.check-tests == false
        run: |
          if (Test-Path "TestLibrary/my-lib/my-lib.Tests") {
            throw "Tests folder should not exist"
          }
          
      - name: Verify .github folder exists
        if: matrix.check-github == true
        run: |
          if (-not (Test-Path "TestLibrary/my-lib/.github")) {
            throw "Expected .github folder not found"
          }
          
      - name: Verify .github folder does not exist
        if: matrix.check-github == false
        run: |
          if (Test-Path "TestLibrary/my-lib/.github") {
            throw ".github folder should not exist"
          }
          
      - name: Verify .devops folder exists
        if: matrix.check-devops == true
        run: |
          if (-not (Test-Path "TestLibrary/my-lib/.devops")) {
            throw "Expected .devops folder not found"
          }
          
      - name: Verify .devops folder does not exist
        if: matrix.check-devops == false
        run: |
          if (Test-Path "TestLibrary/my-lib/.devops") {
            throw ".devops folder should not exist"
          }
          
      - name: Build and Test Solution
        if: matrix.check-tests == true && (matrix.check-sln == true || matrix.check-slnx == true)
        run: |
          Push-Location TestLibrary/my-lib/my-lib
          dotnet build
          dotnet test --no-build
          dotnet pack --configuration Release -o ./NuGet
          
      - name: Build Solution
        if: matrix.check-tests == false && (matrix.check-sln == true || matrix.check-slnx == true)
        run: |
          Push-Location TestLibrary/my-lib
          dotnet build
          dotnet pack --configuration Release -o ./NuGet

      - name: Build Project Only
        if: matrix.check-tests == false && matrix.check-sln == false && matrix.check-slnx == false
        run: |
          Push-Location TestLibrary/my-lib/my-lib
          dotnet build
          dotnet pack --configuration Release -o ./NuGet
      
      - name: Build and Test Project Only
        if: matrix.check-tests == true && matrix.check-sln == false && matrix.check-slnx == false
        run: |
          Push-Location TestLibrary/my-lib/my-lib
          dotnet build
          dotnet pack --configuration Release -o ./NuGet
          Pop-Location
          Push-Location TestLibrary/my-lib/my-lib.Tests
          dotnet test

  test-avalonia:
    runs-on: windows-latest
    needs: [build, detect-changes]
    if: needs.detect-changes.outputs.avalonia == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: "Default (slnx)"
            template-args: ""
            check-slnx: true
            check-sln: false
          - name: "Legacy sln format"
            template-args: "--sln true"
            check-slnx: false
            check-sln: true
          - name: "No solution"
            template-args: "--no-sln"
            check-slnx: false
            check-sln: false

    steps:
      - name: Download NuGet Artifacts
        uses: actions/download-artifact@v8
        with:
          name: NuGet

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Test Template - ${{ matrix.name }}
        run: |
          dotnet new install $(Get-ChildItem -Path "Keboo.Dotnet.Templates.*.nupkg").Name
          mkdir TestAvalonia
          Push-Location TestAvalonia
          dotnet new keboo.avalonia -n my-avalonia-app ${{ matrix.template-args }}
          
      - name: Verify slnx file exists
        if: matrix.check-slnx == true
        run: |
          if (-not (Test-Path "TestAvalonia/my-avalonia-app/*.slnx")) {
            throw "Expected .slnx file not found"
          }
          Write-Host "Contents of .slnx file:"
          Get-Content TestAvalonia/my-avalonia-app/*.slnx
          
      - name: Verify sln file exists
        if: matrix.check-sln == true
        run: |
          if (-not (Test-Path "TestAvalonia/my-avalonia-app/*.sln")) {
            throw "Expected .sln file not found"
          }
          Write-Host "Contents of .sln file:"
          Get-Content TestAvalonia/my-avalonia-app/*.sln
          
      - name: Build
        if: matrix.check-sln == true || matrix.check-slnx == true
        run: |
          Push-Location TestAvalonia/my-avalonia-app
          dotnet workload restore
          dotnet build

  all-tests:
    name: All Tests Summary
    runs-on: ubuntu-latest
    needs: [test-console, test-wpf, test-library, test-avalonia]
    if: always()
    steps:
      - name: Check test results
        run: |
          if ("${{ contains(needs.*.result, 'failure') }}" -eq "true" -or "${{ contains(needs.*.result, 'cancelled') }}" -eq "true") {
            throw "One or more tests failed or were cancelled"
          }
          Write-Host "All tests completed successfully"

  automerge:
    if: ${{ github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' }}
    needs: all-tests
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  push_nugets:
    if: ${{ github.event_name != 'pull_request' }}
    name: Push NuGets
    runs-on: ubuntu-latest
    needs: [build, all-tests]

    permissions:
      id-token: write

    steps:
      - name: Download NuGet Artifacts
        uses: actions/download-artifact@v8
        with:
          name: NuGet

      - name: NuGet login (OIDC → temporary API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push NuGets
        run: |
          dotnet nuget push *.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
